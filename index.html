<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PhotoPro AI V2 Professional</title>
  <meta name="theme-color" content="#070b16" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <h1>PhotoPro AI</h1>
        <p>V2 Professional • chỉnh ảnh đẹp hơn trên iPhone</p>
      </div>
      <button id="autoBtn" class="primary">AI Auto</button>
    </header>

    <section class="card toolbar">
      <input id="libraryInput" type="file" accept="image/*" hidden>
      <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden>
      <button id="libraryBtn">Thư viện ảnh</button>
      <button id="cameraBtn">Chụp ảnh</button>
      <button id="resetBtn">Đặt lại</button>
    </section>

    <section class="preview card">
      <canvas id="canvas"></canvas>
      <p id="hint">Hãy chọn ảnh để bắt đầu chỉnh sửa.</p>
    </section>

    <section class="card presets">
      <button data-preset="portrait">Chân dung đẹp</button>
      <button data-preset="beauty">Da sáng tự nhiên</button>
      <button data-preset="color">Màu chuyên nghiệp</button>
      <button data-preset="clear">Ảnh nét trong</button>
      <button data-preset="soft">Mịn nhẹ</button>
    </section>

    <section class="card switcher">
      <button id="beforeBtn">Giữ để xem ảnh gốc</button>
      <button id="fitBtn">Vừa màn hình</button>
    </section>

    <section class="card controls" id="controls"></section>

    <section class="card actions">
      <button id="saveBtn" class="primary">Lưu ảnh JPG HD</button>
      <button id="pngBtn">Lưu PNG</button>
    </section>

    <footer>
      <p>V2 dùng thuật toán xử lý ảnh trong trình duyệt: cân sáng, màu, làm mịn, khử nhiễu và tăng nét. Không gửi ảnh lên máy chủ.</p>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
