<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PhotoPro AI V1</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#111827">
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>PhotoPro AI</h1>
        <p>Chỉnh ảnh nhanh trên iPhone</p>
      </div>
      <button id="autoBtn" class="primary">Tự động</button>
    </header>

    <section class="card upload">
      <input id="fileInput" type="file" accept="image/*" capture="environment" hidden>
      <button id="pickBtn">Chọn / Chụp ảnh</button>
      <button id="resetBtn">Đặt lại</button>
    </section>

    <section class="preview card">
      <canvas id="canvas"></canvas>
      <p id="hint">Hãy chọn ảnh để bắt đầu chỉnh sửa.</p>
    </section>

    <section class="card controls">
      <label>Sáng da <span id="brightVal">0</span></label>
      <input id="brightness" type="range" min="-50" max="60" value="0">

      <label>Mịn da <span id="smoothVal">0</span></label>
      <input id="smooth" type="range" min="0" max="8" value="0">

      <label>Màu sắc <span id="satVal">0</span></label>
      <input id="saturation" type="range" min="-40" max="80" value="0">

      <label>Tương phản <span id="contrastVal">0</span></label>
      <input id="contrast" type="range" min="-40" max="60" value="0">

      <label>Làm nét <span id="sharpVal">0</span></label>
      <input id="sharpen" type="range" min="0" max="5" value="0">
    </section>

    <section class="card actions">
      <button id="saveBtn" class="primary">Lưu ảnh JPG</button>
      <p class="note">Bản V1 xử lý trực tiếp trong Safari. Không gửi ảnh lên máy chủ.</p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
